services:
  db:
    image: postgres:15-alpine
    container_name: guilherme_db
    environment:
      POSTGRES_USER: guilherme_user
      POSTGRES_PASSWORD: guilherme_password
      POSTGRES_DB: todolist
    volumes:
      - guilherme_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guilherme_user -d todolist"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: ./backend
    container_name: guilherme_api
    restart: always
    ports:
      - "3018:3000"
    environment:
      DB_HOST: db
      DB_USER: guilherme_user
      DB_PASSWORD: guilherme_password
      DB_NAME: todolist
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Use wget (mais seguro que curl em Alpine)
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/tarefas >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: ./frontend
    container_name: guilherme_web
    ports:
      - "8018:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  guilherme_data: